name: Legal Skills Embed

on:
  push:
    branches: [main]
    paths:
      - 'skills/legal/**'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Embed ALL legal skills (not just changed). Safe: only touches domain=legal rows.'
        required: false
        type: boolean
        default: false

jobs:
  embed:
    uses: ./.github/workflows/skill-embed.yml
    with:
      vertical: legal
      domain: legal
      full_sync: ${{ inputs.full_sync == true }}
    secrets:
      SKILLS_DB_URL: ${{ secrets.SKILLS_DB_URL }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
