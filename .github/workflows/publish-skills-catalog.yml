name: Publish Skills Catalog

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/skills-catalog.js'
      - '.github/workflows/publish-skills-catalog.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build shared skills catalog
        run: node scripts/skills-catalog.js --out .artifacts/skills-catalog.json

      - name: Workflow summary
        if: always()
        run: |
          node <<'SCRIPT'
          const fs = require('fs')
          const catalog = JSON.parse(fs.readFileSync('.artifacts/skills-catalog.json', 'utf8'))
          const lines = [
            '## Shared Skills Catalog',
            '',
            `- Total skills: ${catalog.skillCount}`,
            `- Generated from SHA: ${catalog.generatedFromSha || 'not provided'}`,
            '- Counts by category:',
          ]
          for (const [category, count] of Object.entries(catalog.countsByCategory)) {
            lines.push(`  - ${category}: ${count}`)
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`)
          SCRIPT

      - name: Notify casemark-com-v3 to sync new skills
        if: always()
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::warning::DISPATCH_TOKEN not set — skipping cross-repo dispatch"
            exit 0
          fi
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            https://api.github.com/repos/CaseMark/casemark-com-v3/dispatches \
            -d '{"event_type":"skills-updated","client_payload":{"source":"CaseMark/skills","sha":"'"$GITHUB_SHA"'"}}'
          echo "Dispatched skills-updated to CaseMark/casemark-com-v3"

      - name: Notify C3 to revalidate skills cache
        if: always()
        env:
          C3_REVALIDATE_URL: ${{ vars.C3_REVALIDATE_URL }}
          C3_REVALIDATE_SECRET: ${{ secrets.C3_REVALIDATE_SECRET }}
        run: |
          if [ -z "$C3_REVALIDATE_URL" ] || [ -z "$C3_REVALIDATE_SECRET" ]; then
            echo "::warning::C3_REVALIDATE_URL or C3_REVALIDATE_SECRET not set — skipping C3 cache invalidation"
            exit 0
          fi
          http_code=$(curl -s -o /tmp/c3-revalidate.txt -w '%{http_code}' \
            -X POST \
            -H "x-revalidate-secret: $C3_REVALIDATE_SECRET" \
            -H "Content-Type: application/json" \
            "$C3_REVALIDATE_URL" \
            -d '{}')
          echo "C3 revalidate responded $http_code: $(cat /tmp/c3-revalidate.txt)"
          if [ "$http_code" != "200" ]; then
            echo "::warning::C3 revalidate returned non-200 ($http_code)"
          fi
